<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — {{ settings.store_name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0f; --card:#1a1a26; --border:#2a2a3e; --accent:#f59e0b; --text:#e2e8f0; --muted:#64748b; --danger:#ef4444; --surface:#12121a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:3rem; width:100%; max-width:420px; box-shadow:0 40px 80px #00000080; }
    .brand { text-align:center; margin-bottom:2rem; }
    .brand .icon { font-size:3rem; }
    .brand h1 { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--accent); margin-top:0.5rem; }
    .brand p { color:var(--muted); font-size:0.875rem; margin-top:0.3rem; }
    label { display:block; font-size:0.82rem; color:var(--muted); margin-bottom:0.4rem; }
    input[type=password] { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.8rem 1rem; border-radius:8px; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    input[type=password]:focus { border-color:var(--accent); }
    button { width:100%; background:var(--accent); color:#000; border:none; padding:0.85rem; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:1.5rem; transition:background 0.2s; font-family:'DM Sans',sans-serif; }
    button:hover { background:#d97706; }
    .error { background:#7f1d1d33; border:1px solid #ef444444; color:var(--danger); padding:0.7rem 1rem; border-radius:8px; margin-bottom:1.2rem; font-size:0.85rem; text-align:center; }
    .back-link { display:block; text-align:center; margin-top:1.5rem; color:var(--muted); font-size:0.85rem; text-decoration:none; }
    .back-link:hover { color:var(--text); }
    .hint { margin-top:2rem; padding:0.9rem 1rem; background:#0f172a; border-radius:8px; font-size:0.8rem; color:var(--muted); text-align:center; }
    .hint code { color:var(--accent); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <div class="icon">🔐</div>
      <h1>Admin Panel</h1>
      <p>{{ settings.store_name }} — Control Center</p>
    </div>

    {% if request.query_params.get('error') %}
    <div class="error">❌ Incorrect password. Please try again.</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <label>Admin Password</label>
      <input type="password" name="password" placeholder="Enter password..." autofocus required>
      <button type="submit">🔓 Login</button>
    </form>

    <a href="/" class="back-link">← Back to Store</a>

    <div class="hint">Default password: <code>admin123</code> — Change it in Settings after login.</div>
  </div>
</body>
</html>
