<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ settings.store_name }}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3e;
      --accent: #f59e0b;
      --accent2: #38bdf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    /* NAVBAR */
    nav {
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:0 2rem;
      display:flex; align-items:center; justify-content:space-between;
      height:64px; position:sticky; top:0; z-index:100;
    }
    .nav-brand {
      font-family:'Playfair Display',serif;
      font-size:1.5rem; color:var(--accent);
      text-decoration:none; letter-spacing:0.05em;
    }
    .nav-links { display:flex; gap:1.5rem; align-items:center; }
    .nav-links a {
      color:var(--muted); text-decoration:none;
      font-size:0.9rem; font-weight:500;
      transition:color 0.2s;
    }
    .nav-links a:hover { color:var(--text); }

    /* SEARCH BAR */
    .search-form { display:flex; gap:0.5rem; }
    .search-form input {
      background:var(--card); border:1px solid var(--border);
      color:var(--text); padding:0.4rem 1rem;
      border-radius:6px; font-size:0.85rem; width:200px;
      outline:none; transition:border-color 0.2s;
    }
    .search-form input:focus { border-color:var(--accent); }
    .search-form button {
      background:var(--accent); color:#000;
      border:none; padding:0.4rem 1rem;
      border-radius:6px; cursor:pointer;
      font-weight:600; font-size:0.85rem;
    }

    /* BUTTONS */
    .btn {
      display:inline-block; padding:0.6rem 1.4rem;
      border-radius:8px; font-weight:600;
      font-size:0.875rem; cursor:pointer;
      text-decoration:none; border:none;
      transition:all 0.2s;
    }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-primary:hover { background:#d97706; transform:translateY(-1px); }
    .btn-secondary { background:var(--card); color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-danger:hover { background:#dc2626; }
    .btn-success { background:var(--success); color:#fff; }
    .btn-sm { padding:0.35rem 0.8rem; font-size:0.8rem; }

    /* CARDS */
    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px; overflow:hidden;
      transition:transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform:translateY(-4px); border-color:var(--accent); }

    /* FORMS */
    .form-group { margin-bottom:1.2rem; }
    .form-group label { display:block; font-size:0.85rem; color:var(--muted); margin-bottom:0.4rem; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width:100%; background:var(--surface);
      border:1px solid var(--border); color:var(--text);
      padding:0.7rem 1rem; border-radius:8px;
      font-family:'DM Sans',sans-serif; font-size:0.9rem;
      outline:none; transition:border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color:var(--accent); }
    .form-group textarea { min-height:100px; resize:vertical; }

    /* BADGES */
    .badge {
      display:inline-block; padding:0.2rem 0.6rem;
      border-radius:20px; font-size:0.75rem; font-weight:600;
    }
    .badge-pending { background:#92400e22; color:#f59e0b; border:1px solid #f59e0b44; }
    .badge-confirmed { background:#1e3a5f22; color:var(--accent2); border:1px solid #38bdf844; }
    .badge-delivered { background:#065f4622; color:var(--success); border:1px solid #10b98144; }
    .badge-cancelled { background:#7f1d1d22; color:var(--danger); border:1px solid #ef444444; }

    /* LAYOUT */
    .container { max-width:1200px; margin:0 auto; padding:2rem; }
    .page-header { margin-bottom:2rem; }
    .page-header h1 { font-family:'Playfair Display',serif; font-size:2rem; }
    .page-header p { color:var(--muted); margin-top:0.3rem; }

    footer {
      text-align:center; padding:2rem;
      border-top:1px solid var(--border);
      color:var(--muted); font-size:0.85rem; margin-top:4rem;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-brand">{{ settings.store_name }}</a>
  <div class="search-form">
    <form method="get" action="/" style="display:flex;gap:0.5rem;">
      <input type="text" name="search" placeholder="Search products..." value="{{ search or '' }}">
      <button type="submit">🔍</button>
    </form>
  </div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/#categories">Categories</a>
    <a href="/#contact">Contact</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>© 2024 {{ settings.store_name }} — All rights reserved. Powered by FastAPI 🐍</p>
</footer>
{% block extra_js %}{% endblock %}
</body>
</html>
