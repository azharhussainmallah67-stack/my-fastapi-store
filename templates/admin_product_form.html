<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if product %}Edit Product{% else %}Add Product{% endif %} — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0f; --card:#1a1a26; --border:#2a2a3e; --accent:#f59e0b; --text:#e2e8f0; --muted:#64748b; --surface:#12121a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; padding:2rem; }
    .wrap { max-width:640px; margin:0 auto; }
    .back-link { color:var(--muted); text-decoration:none; font-size:0.875rem; display:inline-flex; align-items:center; gap:0.3rem; }
    .back-link:hover { color:var(--text); }
    h1 { font-family:'Playfair Display',serif; font-size:2rem; margin:0.6rem 0 2rem; }
    .form-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:2rem; }
    .form-group { margin-bottom:1.2rem; }
    .form-group label { display:block; font-size:0.82rem; color:var(--muted); margin-bottom:0.4rem; font-weight:500; }
    .form-group input, .form-group textarea {
      width:100%; background:var(--surface); border:1px solid var(--border);
      color:var(--text); padding:0.7rem 1rem; border-radius:8px;
      font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color:var(--accent); }
    .form-group textarea { min-height:90px; resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .preview-img { width:100%; height:180px; border-radius:8px; object-fit:cover; border:1px solid var(--border); margin-top:0.6rem; display:none; }
    .btn { display:inline-block; padding:0.7rem 1.8rem; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; text-decoration:none; border:none; font-family:'DM Sans',sans-serif; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-primary:hover { background:#d97706; }
    .btn-secondary { background:var(--card); color:var(--text); border:1px solid var(--border); }
    .actions { display:flex; gap:1rem; margin-top:1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/admin/dashboard" class="back-link">← Back to Dashboard</a>
    <h1>{% if product %}✏️ Edit Product{% else %}➕ Add New Product{% endif %}</h1>

    <div class="form-card">
      <form method="post" action="{% if product %}/admin/products/edit/{{ product.id }}{% else %}/admin/products/add{% endif %}">
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" name="name" value="{{ product.name if product else '' }}" placeholder="e.g. Premium Leather Wallet" required>
        </div>
        <div class="row">
          <div class="form-group">
            <label>Price ({{ settings.currency }}) *</label>
            <input type="number" name="price" step="0.01" value="{{ product.price if product else '' }}" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label>Stock Quantity *</label>
            <input type="number" name="stock" value="{{ product.stock if product else '' }}" placeholder="0" required>
          </div>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <input type="text" name="category" value="{{ product.category if product else '' }}" placeholder="e.g. Electronics, Clothing, Accessories" required>
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea name="description" placeholder="Describe your product in detail..." required>{{ product.description if product else '' }}</textarea>
        </div>
        <div class="form-group">
          <label>Image URL *</label>
          <input type="url" name="image" id="imgInput" value="{{ product.image if product else '' }}" placeholder="https://example.com/product-image.jpg" required>
          <img id="imgPreview" class="preview-img" src="{{ product.image if product else '' }}" alt="Preview">
        </div>
        <div class="actions">
          <button type="submit" class="btn btn-primary">{% if product %}💾 Save Changes{% else %}✅ Add Product{% endif %}</button>
          <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <script>
    const inp = document.getElementById('imgInput');
    const prev = document.getElementById('imgPreview');
    if (inp.value) prev.style.display = 'block';
    inp.addEventListener('input', () => {
      if (inp.value) { prev.src = inp.value; prev.style.display = 'block'; }
    });
  </script>
</body>
</html>
